name: nacho_chat
description: A frontend for the chat-api

publish_to: "none"

version: 1.6.160+555

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.9
  provider: 6.1.5
  hive: 2.2.3
  hive_flutter: 1.1.0
  path_provider: 2.1.6
  jwt_decode: 0.3.1
  json_annotation: 4.12.0
